{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-header__title">Edit expense</h1>
    <p class="page-header__sub">Update the fields you want to change.</p>
  </div>
  <a href="{{ url_for('expenses.index') }}" class="btn btn--outline">Back</a>
</div>

<div class="form-card">
  <form method="POST" action="" novalidate class="form">

    <div class="form__row">

      <div class="form__group form__group--grow">
        <label class="form__label" for="description">Description <span class="form__required">*</span></label>
        <input
          class="form__input"
          type="text"
          id="description"
          name="description"
          required
          value="{{ request.form.get('description', expense.description) }}"
        />
        <!--
          request.form.get('description', expense.description) means:
          - If the form was submitted (and failed validation), use what the user typed.
          - On a fresh GET, use the existing value from the database object.
          This pattern keeps forms user-friendly on failed submissions.
        -->
      </div>

      <div class="form__group form__group--fixed">
        <label class="form__label" for="amount">Amount ($) <span class="form__required">*</span></label>
        <input
          class="form__input"
          type="number"
          id="amount"
          name="amount"
          step="0.01"
          min="0.01"
          required
          value="{{ request.form.get('amount', expense.amount) }}"
        />
      </div>

    </div>

    <div class="form__row">

      <div class="form__group">
        <label class="form__label" for="date">Date <span class="form__required">*</span></label>
        <input
          class="form__input"
          type="date"
          id="date"
          name="date"
          required
          value="{{ request.form.get('date', expense.date.isoformat()) }}"
        />
        <!--
          expense.date is a Python date object.
          .isoformat() converts it to "YYYY-MM-DD" which is what
          the <input type="date"> expects.
        -->
      </div>

      <div class="form__group">
        <label class="form__label" for="category_id">Category</label>
        <select class="form__input form__select" id="category_id" name="category_id">
          <option value="">None (uncategorised)</option>
          {% for cat in categories %}
            <option value="{{ cat.id }}"
              {% set selected_id = request.form.get('category_id', expense.category_id|string if expense.category_id else '') %}
              {% if selected_id == cat.id|string %}selected{% endif %}>
              {{ cat.name }}
            </option>
          {% endfor %}
        </select>
      </div>

    </div>

    <div class="form__group">
      <label class="form__label" for="notes">Notes <span class="form__optional">(optional)</span></label>
      <textarea
        class="form__input form__textarea"
        id="notes"
        name="notes"
        rows="3"
      >{{ request.form.get('notes', expense.notes or '') }}</textarea>
    </div>

    <div class="form__actions">
      <a href="{{ url_for('expenses.index') }}" class="btn btn--outline">Cancel</a>
      <button type="submit" class="btn btn--primary">Update expense</button>
    </div>

  </form>
</div>

{% endblock %}
